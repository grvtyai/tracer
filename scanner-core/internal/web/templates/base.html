{{define "base"}}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="{{.BodyClass}}">
    <div class="shell">
        <aside class="sidebar">
            <div class="brand-block">
                <div class="brand-mark">ST</div>
                <div>
                    <div class="brand-name">{{.AppName}}</div>
                    <div class="brand-sub">Powered by tracer scanner-core</div>
                </div>
            </div>

            <nav class="nav">
                <a class="nav-link {{if eq .ActiveNav "dashboard"}}active{{end}}" href="{{if .CurrentProject}}/?project={{.CurrentProject.ID}}{{else}}/{{end}}">Dashboard</a>
                <a class="nav-link {{if eq .ActiveNav "runs"}}active{{end}}" href="{{if .CurrentProject}}/runs?project={{.CurrentProject.ID}}{{else}}/runs{{end}}">Runs</a>
                <a class="nav-link {{if eq .ActiveNav "assets"}}active{{end}}" href="{{if .CurrentProject}}/assets?project={{.CurrentProject.ID}}{{else}}/assets{{end}}">Assets</a>
                <a class="nav-link {{if eq .ActiveNav "analytics"}}active{{end}}" href="{{if .CurrentProject}}/analytics?project={{.CurrentProject.ID}}{{else}}/analytics{{end}}">Analytics</a>
                <a class="nav-link {{if eq .ActiveNav "settings"}}active{{end}}" href="{{if .CurrentProject}}/settings?project={{.CurrentProject.ID}}{{else}}/settings{{end}}">Settings</a>
            </nav>

            <div class="sidebar-foot">
                <div class="foot-label">Store</div>
                <div class="foot-value">{{.DBPath}}</div>
            </div>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <div class="eyebrow">{{.HeroNote}}</div>
                    <h1>{{.Title}}</h1>
                </div>
                <div class="topbar-meta">
                    <label class="switcher-label" for="project-switcher">Project</label>
                    <select id="project-switcher" class="input project-switcher" data-switch-path="{{.ProjectSwitchPath}}">
                        {{if .Projects}}
                            {{range .Projects}}
                            <option value="{{.ID}}" {{if $.CurrentProject}}{{if eq $.CurrentProject.ID .ID}}selected{{end}}{{end}}>{{.Name}} {{if .PublicID}}({{.PublicID}}){{end}}</option>
                            {{end}}
                        {{else}}
                            <option value="">No projects yet</option>
                        {{end}}
                        <option value="__new__">Neues Projekt +</option>
                    </select>
                </div>
            </header>

            {{if .Notice}}
            <section class="notice success">{{.Notice}}</section>
            {{end}}

            {{template "page" .}}
        </main>
    </div>

    <script>
        (function () {
            var switcher = document.getElementById("project-switcher");
            if (!switcher) return;
            switcher.addEventListener("change", function () {
                if (switcher.value === "__new__") {
                    window.location.href = "/projects/new";
                    return;
                }
                if (!switcher.value) return;
                var target = switcher.getAttribute("data-switch-path") || "/";
                window.location.href = target + "?project=" + encodeURIComponent(switcher.value);
            });
        }());
    </script>
</body>
</html>
{{end}}
