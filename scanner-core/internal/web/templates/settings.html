{{define "settings.html"}}{{template "base" .}}{{end}}

{{define "page"}}
<section class="panel-grid">
    <article class="panel">
        <div class="panel-head">
            <h2>Current Runtime</h2>
        </div>
        <div class="kv-grid">
            <div class="kv-key">Data directory</div>
            <div class="kv-value mono">{{.DataDir}}</div>
            <div class="kv-key">SQLite database</div>
            <div class="kv-value mono">{{.DBPath}}</div>
            <div class="kv-key">Default project</div>
            <div class="kv-value">{{if .Settings.DefaultProjectID}}{{.Settings.DefaultProjectID}}{{else}}not set{{end}}</div>
        </div>
    </article>

    <article class="panel">
        <div class="panel-head">
            <h2>Startup Behavior</h2>
        </div>
        <form method="post" action="/settings" class="asset-form">
            <label class="form-row">
                <span class="form-label">Default project</span>
                <select class="input" name="default_project_id">
                    <option value="">No default project</option>
                    {{range .Projects}}
                    <option value="{{.ID}}" {{if eq $.Settings.DefaultProjectID .ID}}selected{{end}}>{{.Name}} {{if .PublicID}}({{.PublicID}}){{end}}</option>
                    {{end}}
                </select>
            </label>
            <div class="hero-actions">
                <button class="button button-primary" type="submit">Save settings</button>
            </div>
        </form>
    </article>
</section>
{{end}}
